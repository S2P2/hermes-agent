name: eko-platform
label: Eko
kind: platform
version: 1.8.0
description: >
  Eko Messaging API gateway adapter for Hermes Agent.
  Runs an aiohttp webhook server that receives Eko webhook events
  and relays messages between Eko users and the Hermes agent.
  Outbound replies prefer the reply token endpoint and fall back
  to the push API when the token has expired or is absent.
author: Hermes Agent contributors
requires_env:
  - name: EKO_BASE_URL
    description: "Eko server base URL (e.g. https://customer-h1.ekoapp.com)"
    prompt: "Eko base URL"
    password: false
  - name: EKO_OAUTH_CLIENT_ID
    description: "Bot OAuth client ID from Eko admin panel"
    prompt: "OAuth client ID"
    password: false
  - name: EKO_OAUTH_CLIENT_SECRET
    description: "Bot OAuth client secret from Eko admin panel"
    prompt: "OAuth client secret"
    password: true
optional_env:
  - name: EKO_PORT
    description: "Webhook listen port (default: 8647)"
    prompt: "Webhook port"
    password: false
  - name: EKO_HOST
    description: "Webhook bind host (default: 0.0.0.0)"
    prompt: "Webhook host"
    password: false
  - name: EKO_WEBHOOK_PATH
    description: "Webhook endpoint path (default: /eko/webhook)"
    prompt: "Webhook path"
    password: false
  - name: EKO_ALLOWED_USERS
    description: "Comma-separated Eko user IDs allowed to DM the bot"
    prompt: "Allowed user IDs (comma-separated)"
    password: false
  - name: EKO_ALLOW_ALL_USERS
    description: "Allow any Eko user to talk to the bot (dev only)"
    prompt: "Allow all users? (true/false)"
    password: false
  - name: EKO_HOME_CHANNEL
    description: "Default user ID for cron / notification delivery"
    prompt: "Home channel ID (or empty)"
    password: false
  - name: EKO_REPLY_TOKEN_TTL
    description: "Reply-token TTL in seconds (default: 50)"
    prompt: "Reply token TTL (seconds)"
    password: false
  - name: EKO_REQUIRE_MENTION
    description: "Only respond to group messages containing a trigger word (default: true)"
    prompt: "Require mention in groups? (true/false)"
    password: false
  - name: EKO_MENTION_TRIGGERS
    description: "Comma-separated trigger words for require_mention (default: hermes)"
    prompt: "Mention trigger words (comma-separated)"
    password: false
  - name: EKO_ALLOWED_GROUPS
    description: "Comma-separated group IDs the bot responds to"
    prompt: "Allowed group IDs (comma-separated)"
    password: false
  - name: EKO_ALLOWED_TOPICS
    description: "Comma-separated gid:tid pairs for topic-level allowlist"
    prompt: "Allowed topics (gid:tid, comma-separated)"
    password: false
  - name: EKO_ALLOW_ALL_GROUPS
    description: "Allow all groups (default: true). Set false to activate group allowlist."
    prompt: "Allow all groups? (true/false)"
    password: false
  - name: EKO_WEBHOOK_SECRET
    description: "Separate HMAC signing key for webhook signature verification (default: OAuth secret)"
    prompt: "Webhook signing secret (blank = use OAuth secret)"
    password: true
  - name: EKO_REQUIRE_SIGNATURE
    description: "Verify X-Eko-Signature on inbound webhooks (default: true)"
    prompt: "Require webhook signature? (true/false)"
    password: false
  - name: EKO_MESSAGE_MAX_CHARS
    description: "Max chars per outbound message; longer text is chunked (default: 5000)"
    prompt: "Max message chars"
    password: false
  - name: EKO_MAX_UPLOAD_BYTES
    description: "Max file size for outbound uploads in bytes (default: 26214400 = 25 MiB)"
    prompt: "Max upload bytes"
    password: false
  - name: EKO_MAX_INBOUND_MEDIA_BYTES
    description: "Max size for inbound picture downloads in bytes (default: 26214400 = 25 MiB)"
    prompt: "Max inbound media bytes"
    password: false